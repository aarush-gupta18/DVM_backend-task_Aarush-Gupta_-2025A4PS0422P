<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>APOGEE '26 — Schedule</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<section class="hero-section">
  <div class="eyebrow">OFFICIAL SCHEDULE</div>
  <h1 class="fest-title">APOGEE '26</h1>
  <nav class="days-row" id="day-filters">
    <button class="day active" id="day-all" onclick="filterDay(-1)" data-d="-1">ALL DAYS</button>
    <button class="day" id="day-0" onclick="filterDay(0)" data-d="0">DAY 0</button>
    <button class="day" id="day-1" onclick="filterDay(1)" data-d="1">DAY 1</button>
    <button class="day" id="day-2" onclick="filterDay(2)" data-d="2">DAY 2</button>
  </nav>
  <div class="deck" id="deck"></div>
  <p class="scroll-hint">↓ &nbsp; scroll to explore events</p>
</section>
<section class="events-section">
  <div class="ctrl">
    <input class="search" id="srch" type="text" placeholder="🔍  Search events…" autocomplete="off" />
    <div class="filter-row">
      <div class="fbtns" id="fbtns"></div>
      <select class="sort-sel" id="srt">
        <option value="">Sort by…</option>
        <option value="day">📅 Day (Asc)</option>
        <option value="reg">🔥 Most Popular</option>
      </select>
    </div>
  </div>
  <div class="sec-lbl" id="all-lbl">ALL EVENTS</div>
  <div class="grid" id="ev-grid"></div>
  <div class="empty hidden" id="empty"> No events match </div>
  <div class="sec-lbl hidden" id="lu-lbl">MY LINEUP </div>
  <div class="grid" id="lu-grid"></div>
</section>
<script src="schedule.js"></script>
<script src="script.js"></script>
</body>
</html>
